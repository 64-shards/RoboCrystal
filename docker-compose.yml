services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: robocrystal-app
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8501"
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    container_name: robocrystal-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - web

networks:
  web:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
